name: CI - Extension

on:
  pull_request:
    branches: [main]
    paths:
      - "extension/**"

jobs:
  extension-unit:
    name: Extension Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run unit tests
        working-directory: extension
        run: npm test
